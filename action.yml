name: Bump govulncheck

description: Update the govulncheck version in a file to the latest available release.

inputs:
  file:
    description: Path to the file to update.
    required: true
  path:
    description: >
      yq expression locating the line to update (e.g. .inputs.govulncheck-version.default).
      Mutually exclusive with replace.
    required: false
    default: ''
  match:
    description: Regex matching the line to rewrite. Pair with replace.
    required: false
    default: ''
  replace:
    description: >
      Replacement line. Use {version} as the placeholder for the new version.
      Pair with match.
    required: false
    default: ''

outputs:
  version:
    description: The latest govulncheck version.
    value: ${{ steps.bump-govulncheck.outputs.version }}
  changed:
    description: Whether the file was modified by this run (true|false).
    value: ${{ steps.bump-govulncheck.outputs.changed }}

runs:
  using: composite
  steps:
    - name: Bump govulncheck
      id: bump-govulncheck
      run: ${{ github.action_path }}/src/bump_govulncheck.sh
      shell: sh
      env:
        FILE: ${{ inputs.file }}
        YAML_PATH: ${{ inputs.path }}
        LINE_MATCH: ${{ inputs.match }}
        LINE_REPLACE: ${{ inputs.replace }}
