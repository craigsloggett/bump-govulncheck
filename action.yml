name: Bump govulncheck

description: Update the govulncheck version in a file to the latest available release.

inputs:
  file:
    description: Path to the file to update.
    required: true
  path:
    description: yq expression locating the line to update (e.g. .inputs.govulncheck-version.default). Must be paired with match. Mutually exclusive with replace.
    required: false
    default: ''
  match:
    description: Regex pattern. With path, matches the version substring on the located line. With replace, matches the line to rewrite.
    required: false
    default: ''
  replace:
    description: Replacement line for the line-based mode. Use {version} as the placeholder for the new version. Pair with match.
    required: false
    default: ''

outputs:
  version:
    description: The latest govulncheck version.
    value: ${{ steps.bump-govulncheck.outputs.version }}
  changed:
    description: Whether the file was modified by this run (true|false).
    value: ${{ steps.bump-govulncheck.outputs.changed }}

runs:
  using: composite
  steps:
    - name: Bump govulncheck
      id: bump-govulncheck
      run: ${{ github.action_path }}/src/bump_govulncheck.sh
      shell: sh
      env:
        FILE: ${{ inputs.file }}
        YAML_PATH: ${{ inputs.path }}
        MATCH: ${{ inputs.match }}
        REPLACE: ${{ inputs.replace }}
